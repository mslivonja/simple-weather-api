version: "3.9"

services:

  simple-weather-api:
    image: simple-weather-api:latest
    container_name: simple-weather-api
    ports:
      - "5000:5000"
    restart: always
    environment:
      - OPENWEATHER_API_KEY
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY
      - MINIO_SECRET_KEY

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    restart: always
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data: