name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev
  push:
    branches:
      - main
      - dev

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install -r requirements.txt

      # Step 4: Run Flake8 (Static Code Analysis)
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
          
      # Step 5: Run unit tests with coverage
      - name: Run unit tests with coverage
        continue-on-error: true
        run: |
          pytest tests/unit --cov=. --cov-report=xml --cov-report=term

      - name: Determine Docker tag
        if: github.event_name == 'pull_request'
        id: set_tag
        run: |
          echo "tag=PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        if: github.event_name == 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 6: Build Docker image (only if tests pass)
      - name: Build and push docker image
        if: github.event_name == 'pull_request'
        run: |
          docker build -t mslivonja/simple-weather-api:${{ steps.set_tag.outputs.tag }} .
          docker push mslivonja/simple-weather-api:${{ steps.set_tag.outputs.tag }}
          
      - name: Generate .env file from template
        if: github.event_name == 'pull_request'
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          VERSION: ${{ steps.set_tag.outputs.tag }}
        run: | 
          sudo apt-get update && sudo apt-get install -y gettext-base
          envsubst < .env.template > .env
          cat .env

      # Step 7: Copy files to remote server on port 2222
      - name: Copy files via SCP
        if: github.event_name == 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: ".env,docker-compose.yml"
          target: "/tmp/docker-sandbox/stage"

      # Step 7: Run complete App. stack
      - name: Run command on remote server
        if: github.event_name == 'pull_request'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /tmp/docker-sandbox/stage
            docker-compose pull
            docker-compose up -d
