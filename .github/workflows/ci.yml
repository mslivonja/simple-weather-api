name: CI Pipeline

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - dev

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install -r requirements.txt

      # Step 4: Run Flake8 (Static Code Analysis)
      - name: Run Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
          
      # Step 5: Run unit tests with coverage
      - name: Run unit tests with coverage
        continue-on-error: true
        run: |
          pytest tests/unit --cov=. --cov-report=xml --cov-report=term

      - name: Determine Docker tag
        if: github.event_name == 'pull_request'
        id: set_tag
        run: |
          echo "tag=PR-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      # Step 6: Build Docker image (only if tests pass)
      - name: Build and push docker image
        if: github.event_name == 'pull_request'
        run: |
          docker build -t mslivonja/simple-weather-api:${{ steps.set_tag.outputs.tag }} .